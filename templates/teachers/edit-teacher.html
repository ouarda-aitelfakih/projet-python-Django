{% extends 'Home/base.html' %}
{% load static %}
{% block body %}
<div class='page-wrapper'><div class='content container-fluid'>
    <div class='page-header'><h3 class='page-title'>Edit Teacher</h3></div>
        <div class='card'><div class='card-body'>
            <form method='POST' enctype='multipart/form-data'>
            {% csrf_token %}
                <div class='row'>
                    <div class='col-12 col-sm-6'>
                        <div class='form-group'><label>First Name</label>
                            <input type='text' name='first_name' class='form-control'value='{{ teacher.first_name }}' required>
                        </div>
                    </div>
                    <div class='col-12 col-sm-6'>
                        <div class='form-group'><label>Last Name</label>
                            <input type='text' name='last_name' class='form-control'value='{{ teacher.last_name }}' required>
                        </div>
                    </div>
                    <div class='col-12 col-sm-6'>
                        <div class='form-group'><label>Gender</label>
                            <select name='gender' class='form-control'>
                                <option value='Male'
                                {% if teacher.gender == 'Male' %}selected{% endif %}>Male</option>
                                <option value='Female'{% if teacher.gender == 'Female' %}selected{% endif %}>Female</option>
                            </select>
                        </div>
                    </div>
                    <div class='col-12 col-sm-6'>
                        <div class='form-group'><label>Date of Birth</label>
                            <input type='date' name='date_of_birth' class='form-control'value='{{ teacher.date_of_birth|date:"Y-m-d" }}'>
                        </div>
                    </div>
                    <div class='col-12 col-sm-6'>
                        <div class='form-group'><label>Email</label>
                            <input type='email' name='email' class='form-control'value='{{ teacher.email }}'>
                        </div>
                    </div>
                    <div class='col-12 col-sm-6'>
                        <div class='form-group'><label>Phone</label>
                            <input type='text' name='phone' class='form-control'value='{{ teacher.phone }}'>
                        </div>
                    </div>
                    <div class='col-12 col-sm-6'>
                        <div class='form-group'><label>Joining Date</label>
                        <input type='date' name='joining_date' class='form-control'value='{{ teacher.joining_date|date:"Y-m-d" }}'>
                        </div>
                    </div>
                        <div class='col-12 col-sm-6'>
                            <div class='form-group'><label>Qualification</label>
                                <input type='text' name='qualification' class='form-control'value='{{ teacher.qualification }}'>
                            </div>
                        </div>
                        <div class='col-12 col-sm-6'>
                            <div class='form-group'><label>Department</label>
                                <select name='department' class='form-control'>
                                    <option value=''>— Select Department —</option>
                                    {% for dept in departments %}
                                    <option value='{{ dept.pk }}'{% if dept.pk == teacher.department.pk %}selected{% endif %}>
                                    {{ dept.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class='col-12'>
                            <div class='form-group'><label>Address</label>
                                <textarea name='address' class='form-control' rows='3'>
                                {{ teacher.address }}
                                </textarea>
                            </div>
                        </div>
                        <div class='col-12'>
                            <div class='form-group'><label>Teacher Image</label>
                                <input type='file' name='teacher_image' class='form-control'>
                                {% if teacher.teacher_image %}
                                <small>Current: <a href='{{ teacher.teacher_image.url }}'>View</a></small>
                                {% endif %}
                            </div>
                        </div>
                        <div class='col-12'>
                            <button type='submit' class='btn btn-primary'>Save Changes</button>
                            <a href="{% url 'teacher_list' %}" class='btn btn-secondary ml-2'>Cancel</a>
                        </div>
                    </div>
                </form>
        </div></div>
</div></div>
{% endblock %}
