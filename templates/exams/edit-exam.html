{% extends 'Home/base.html' %}
{% load static %}
{% block body %}
<div class='page-wrapper'>
<div class='content container-fluid'>
    <div class='page-header'>
        <h3 class='page-title'>Edit Exam</h3>
        <ul class='breadcrumb'>
            <li class='breadcrumb-item'><a href="{% url 'exam_list' %}">Exams</a></li>
            <li class='breadcrumb-item active'>Edit Exam</li>
        </ul>
    </div>
    <div class='card'><div class='card-body'>
        <form method='POST'>
            {% csrf_token %}
            <div class='row'>
                <div class='col-12 col-sm-6'>
                    <div class='form-group'>
                        <label>Exam Name *</label>
                        <input type='text' name='name' class='form-control'
                               value='{{ exam.name }}' required>
                    </div>
                </div>
                <div class='col-12 col-sm-6'>
                    <div class='form-group'>
                        <label>Subject *</label>
                        <select name='subject' class='form-control' required>
                            <option value=''>— Select Subject —</option>
                            {% for subject in subjects %}
                            <option value='{{ subject.pk }}'
                                {% if subject.pk == exam.subject.pk %}selected{% endif %}>
                                {{ subject.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class='col-12 col-sm-6'>
                    <div class='form-group'>
                        <label>Date *</label>
                        <input type='date' name='date' class='form-control'
                               value='{{ exam.date|date:"Y-m-d" }}' required>
                    </div>
                </div>
                <div class='col-12 col-sm-6'>
                    <div class='form-group'>
                        <label>Start Time</label>
                        <input type='time' name='start_time' class='form-control'
                               value='{{ exam.start_time }}'>
                    </div>
                </div>
                <div class='col-12 col-sm-6'>
                    <div class='form-group'>
                        <label>End Time</label>
                        <input type='time' name='end_time' class='form-control'
                               value='{{ exam.end_time }}'>
                    </div>
                </div>
                <div class='col-12 col-sm-6'>
                    <div class='form-group'>
                        <label>Room</label>
                        <input type='text' name='room' class='form-control'
                               value='{{ exam.room }}'>
                    </div>
                </div>
                <div class='col-12 col-sm-6'>
                    <div class='form-group'>
                        <label>Total Marks</label>
                        <input type='number' name='total_marks' class='form-control'
                               value='{{ exam.total_marks }}'>
                    </div>
                </div>
                <div class='col-12'>
                    <button type='submit' class='btn btn-primary'>Save Changes</button>
                    <a href="{% url 'exam_list' %}" class='btn btn-secondary ml-2'>Cancel</a>
                </div>
            </div>
        </form>
    </div></div>
</div>
</div>
{% endblock %}
