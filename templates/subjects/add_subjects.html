{% extends 'Home/base.html' %}
{% load static %}
{% block body %}

<div class="page-wrapper">
  <div class="content container-fluid">

    <div class="page-header">
      <div class="row align-items-center">
        <div class="col">
          <h3 class="page-title">Ajouter une matière</h3>
        </div>
        <div class="col-auto">
          <a href="{% url 'subject_list' %}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left"></i> Retour
          </a>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">

        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post">
          {% csrf_token %}

          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Nom de la matière <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label>Code <span class="text-danger">*</span></label>
                <input type="text" name="code" class="form-control" required>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Département <span class="text-danger">*</span></label>
                <select name="department" class="form-control" required>
                  <option value="">-- Choisir un département --</option>
                  {% for dept in departments %}
                    <option value="{{ dept.pk }}">{{ dept.name }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label>Enseignant responsable</label>
                <select name="teacher" class="form-control">
                  <option value="">-- Aucun --</option>
                  {% for t in teachers %}
                    <option value="{{ t.pk }}">{{ t.first_name }} {{ t.last_name }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="3"></textarea>
          </div>

          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Enregistrer
          </button>
          <a href="{% url 'subject_list' %}" class="btn btn-secondary">Annuler</a>
        </form>
      </div>
    </div>

  </div>
</div>

{% endblock %}
